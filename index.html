<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌐 STOMPLE UNESR - COLOR FIX</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --admin: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Tablero Forzado */
        #board { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
            width: 90vw; max-width: 360px; aspect-ratio: 1/1; 
            margin: 10px auto; background: #1e293b; padding: 10px; border-radius: 12px; 
        }
        
        /* Clases de Colores con Soporte Total */
        .marble { width: 100%; height: 100%; border-radius: 50%; border: none; cursor: pointer; min-height: 25px; transition: transform 0.1s; }
        .c1 { background: radial-gradient(circle, #ff4d4d, #990000) !important; }
        .c2 { background: radial-gradient(circle, #4da6ff, #0044cc) !important; }
        .c3 { background: radial-gradient(circle, #ffcc00, #b38f00) !important; }
        .c4 { background: radial-gradient(circle, #df80ff, #7a0099) !important; }
        .c5 { background: radial-gradient(circle, #66ff66, #008000) !important; }
        .c6 { background: radial-gradient(circle, #a6a6a6, #333333) !important; }
        .stomped { background: #0f172a !important; opacity: 0.2; transform: scale(0.6); pointer-events: none; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
        
        #admin-panel { display: none; background: #1e293b; border-top: 2px solid var(--admin); padding: 8px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay">
        <h2 style="margin-bottom: 30px;">🎨 ELIGE TU COLOR</h2>
        <div id="color-options" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;"></div>
        <button id="start-btn" class="btn-main" disabled onclick="unirse()" style="margin-top:40px;">ENTRAR A LA PARTIDA</button>
    </div>

    <div id="game-ui" style="display:none; flex-direction: column; height: 100%;">
        <div style="padding: 10px; display: flex; justify-content: space-between;">
            <div id="scoreboard" style="font-weight: bold; font-size: 0.8rem;"></div>
            <button onclick="location.reload()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">SALIR</button>
        </div>
        <div id="board"></div>
        <div id="msg" style="color: var(--accent); font-weight: bold; margin: 10px;"></div>
        
        <div id="admin-panel">
            <button class="btn-main" style="font-size: 0.8rem; height: 40px;" onclick="resetBoard()">REINICIAR TABLERO</button>
            <div id="kick-list" style="margin-top: 8px; display: flex; gap: 5px; justify-content: center;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('stomple_bejuma_final_v2');

        let myId = localStorage.getItem('stomple_id') || "U-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('stomple_id', myId);
        
        let selectedColor = null;
        let localState = null;

        // Escucha principal
        db.on('value', (snap) => {
            localState = snap.val() || { players: {}, tablero: null, host: "" };
            
            if (localState.players && localState.players[myId]) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                if (localState.host === myId) document.getElementById('admin-panel').style.display = 'block';
                renderGame();
                renderKickList();
            } else {
                document.getElementById('setup-screen').style.display = 'flex';
                document.getElementById('game-ui').style.display = 'none';
                renderSelector();
            }
        });

        function renderSelector() {
            const container = document.getElementById('color-options');
            container.innerHTML = '';
            const takenColors = Object.values(localState.players).map(p => p.color);
            
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('div');
                const isTaken = takenColors.includes(i);
                opt.className = `marble c${i} ${isTaken ? 'stomped' : ''}`;
                opt.style.width = "60px"; opt.style.height = "60px";
                
                if (!isTaken) {
                    opt.onclick = () => {
                        selectedColor = i;
                        document.getElementById('start-btn').disabled = false;
                        container.querySelectorAll('.marble').forEach(m => m.style.outline = "none");
                        opt.style.outline = "4px solid white";
                    };
                }
                container.appendChild(opt);
            }
        }

        async function unirse() {
            let updates = {};
            if (!localState.tablero) {
                const nuevoTab = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                updates['tablero'] = nuevoTab;
                updates['host'] = myId;
                updates['turno'] = 0;
            }
            const pNum = Object.keys(localState.players).length + 1;
            updates[`players/${myId}`] = { color: selectedColor, pos: {r:-1, c:-1}, pNum: pNum };
            await db.update(updates);
        }

        function renderGame() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            const keys = Object.keys(localState.players);

            localState.tablero.forEach((fila, r) => {
                fila.forEach((color, c) => {
                    const m = document.createElement('div');
                    m.className = `marble c${color} ${color === 0 ? 'stomped' : ''}`;
                    
                    keys.forEach(id => {
                        const p = localState.players[id];
                        if (p.pos.r === r && p.pos.c === c) {
                            const t = document.createElement('div');
                            t.style = "width:80%; height:80%; border:2px solid white; border-radius:50%; margin:10%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold;";
                            t.innerText = id === myId ? 'YO' : 'P' + p.pNum;
                            if(id === myId) t.style.boxShadow = "0 0 10px #38bdf8";
                            m.appendChild(t);
                        }
                    });

                    m.onclick = () => mover(r, c, keys);
                    boardEl.appendChild(m);
                });
            });
            document.getElementById('msg').innerText = (keys[localState.turno] === myId) ? "⭐ ES TU TURNO ⭐" : "Esperando a otro jugador...";
        }

        function mover(r, c, keys) {
            if (keys[localState.turno] !== myId) return;
            const p = localState.players[myId];
            const esAdy = Math.abs(p.pos.r - r) <= 1 && Math.abs(p.pos.c - c) <= 1;

            if (p.pos.r === -1) { if (r!==0 && r!==9 && c!==0 && c!==9) return; }
            else if (!esAdy && localState.tablero[r][c] !== p.color) return;

            let nt = JSON.parse(JSON.stringify(localState.tablero));
            const target = nt[r][c];
            const hundir = (row, col) => {
                if (row<0||row>=10||col<0||col>=10||nt[row][col]!==target||nt[row][col]===0) return;
                nt[row][col] = 0;
                hundir(row+1,col); hundir(row-1,col); hundir(row,col+1); hundir(row,col-1);
            };
            hundir(r, c);
            db.update({ tablero: nt, turno: (localState.turno + 1) % keys.length, [`players/${myId}/pos`]: {r, c} });
        }

        function renderKickList() {
            const list = document.getElementById('kick-list');
            list.innerHTML = '';
            Object.keys(localState.players).forEach(id => {
                if (id !== myId) {
                    const b = document.createElement('button');
                    b.innerText = `X P${localState.players[id].pNum}`;
                    b.style = "background:red; color:white; border:none; padding:4px; border-radius:4px; font-size:10px;";
                    b.onclick = () => db.child('players/'+id).remove();
                    list.appendChild(b);
                }
            });
        }

        function resetBoard() {
            const t = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
            db.update({ tablero: t, turno: 0 });
        }
    </script>
</body>
</html>
