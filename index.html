<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 STOMPLE SOCIAL PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Pantallas */
        #setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #game-screen { display: none; }

        /* Selector de Color */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
        .color-opt { width: 60px; height: 60px; border-radius: 50%; border: 4px solid transparent; cursor: pointer; transition: 0.3s; position: relative; }
        .color-opt.taken { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .color-opt.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px white; }
        .taken-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--red); font-weight: bold; }

        /* Marcador y Tablero */
        #scoreboard { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .p-card { background: #1e293b; padding: 8px; border-radius: 8px; border: 2px solid #334155; min-width: 65px; font-size: 0.8rem; }
        .active-p { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #board { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
            width: 92vw; max-width: 420px; aspect-ratio: 1/1; 
            margin: 0 auto; background: #1e293b; padding: 10px; border-radius: 12px; position: relative;
        }

        /* Canicas */
        .marble { width: 100%; height: 100%; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .c1 { background: radial-gradient(circle, #ff4444, #880000); } .c2 { background: radial-gradient(circle, #44aaff, #004488); }
        .c3 { background: radial-gradient(circle, #ffbb00, #886600); } .c4 { background: radial-gradient(circle, #cc44ff, #6b21a8); }
        .c5 { background: radial-gradient(circle, #4ade80, #166534); } .c6 { background: radial-gradient(circle, #555555, #000000); }
        .stomped { opacity: 0; pointer-events: none; }
        .pos-indicator { border: 3px solid white; box-shadow: 0 0 10px white; z-index: 10; transform: scale(1.15); }

        /* Emotes */
        #emote-panel { margin: 15px 0; display: flex; justify-content: center; gap: 12px; }
        .emote-btn { font-size: 1.6rem; background: #1e293b; border: 1px solid #334155; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; }
        .floating-emote { position: absolute; font-size: 4rem; animation: floatUp 2s forwards; left: 50%; top: 40%; transform: translateX(-50%); pointer-events: none; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 20px); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -100px); } }

        button#start-btn { background: var(--accent); color: #000; border: none; padding: 15px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .admin-btn { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 0.7rem; margin-top: 20px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>🎨 STOMPLE BEJUMA</h1>
        <p>Elige tu color de la bolsa:</p>
        <div class="color-grid" id="color-options"></div>
        <button id="start-btn" disabled onclick="unirse()">ENTRAR A LA PARTIDA</button>
    </div>

    <div id="game-screen">
        <div id="scoreboard"></div>
        <div id="game-container" style="position:relative; display:inline-block;">
            <div id="board"></div>
            <div id="emote-display"></div>
        </div>
        <div id="emote-panel">
            <button class="emote-btn" onclick="sendEmote('😂')">😂</button>
            <button class="emote-btn" onclick="sendEmote('🔥')">🔥</button>
            <button class="emote-btn" onclick="sendEmote('😎')">😎</button>
            <button class="emote-btn" onclick="sendEmote('🎯')">🎯</button>
        </div>
        <div id="msg" style="font-weight:bold; color:var(--accent);">Sincronizando...</div>
        <button class="admin-btn" onclick="resetTotal()">REINICIAR TODO (ADMIN)</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('stomple_vBejuma_Final');

        let myId = localStorage.getItem('stomple_id') || "U" + Math.floor(Math.random() * 9999);
        localStorage.setItem('stomple_id', myId);
        
        let selectedColor = null;
        let gameState = null;

        // Escuchar Firebase
        db.on('value', (snap) => {
            gameState = snap.val() || { players: {}, tablero: null, turno: 0 };
            
            if (gameState.players && gameState.players[myId]) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                renderGame();
            } else {
                renderSelector();
            }
        });

        function renderSelector() {
            const container = document.getElementById('color-options');
            container.innerHTML = '';
            const taken = Object.values(gameState.players || {}).map(p => p.color);

            for (let i = 1; i <= 6; i++) {
                const isTaken = taken.includes(i);
                const opt = document.createElement('div');
                opt.className = `color-opt c${i} ${isTaken ? 'taken' : ''} ${selectedColor === i ? 'selected' : ''}`;
                if (!isTaken) {
                    opt.onclick = () => { selectedColor = i; document.getElementById('start-btn').disabled = false; renderSelector(); };
                } else {
                    opt.innerHTML = '<span class="taken-label">OCUPADO</span>';
                }
                container.appendChild(opt);
            }
        }

        function unirse() {
            if (!gameState.tablero) {
                let t = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                db.child('tablero').set(t);
            }
            db.child('players/' + myId).set({ color: selectedColor, pos: {r:-1, c:-1}, status: 'active' });
        }

        function renderGame() {
            const boardEl = document.getElementById('board');
            const scoreEl = document.getElementById('scoreboard');
            boardEl.innerHTML = ''; scoreEl.innerHTML = '';

            const keys = Object.keys(gameState.players);
            keys.forEach((id, i) => {
                const p = gameState.players[id];
                scoreEl.innerHTML += `<div class="p-card ${gameState.turno===i?'active-p':''}">P${i+1}<div class="marble c${p.color}" style="width:12px;height:12px;margin:4px auto"></div></div>`;
            });

            const myTurnIdx = keys.indexOf(myId);
            document.getElementById('msg').innerText = (gameState.turno === myTurnIdx) ? "⭐ ¡TU TURNO! ⭐" : "Esperando turno...";

            gameState.tablero.forEach((fila, r) => {
                fila.forEach((color, c) => {
                    const m = document.createElement('div');
                    m.className = `marble c${color} ${color === 0 ? 'stomped' : ''}`;
                    keys.forEach(id => {
                        if(gameState.players[id].pos.r === r && gameState.players[id].pos.c === c) m.classList.add('pos-indicator');
                    });
                    m.onclick = () => mover(r, c, keys);
                    boardEl.appendChild(m);
                });
            });
        }

        function mover(r, c, keys) {
            if (keys.indexOf(myId) !== gameState.turno) return;
            const miInfo = gameState.players[myId];
            const miPos = miInfo.pos;
            const esAdy = Math.abs(miPos.r - r) <= 1 && Math.abs(miPos.c - c) <= 1;
            
            // Lógica de "Vuelo": Si no es adyacente, debe ser tu color
            if (miPos.r !== -1 && !esAdy && gameState.tablero[r][c] !== miInfo.color) return;
            if (miPos.r === -1 && (r!==0 && r!==9 && c!==0 && c!==9)) return;

            let nuevoTab = JSON.parse(JSON.stringify(gameState.tablero));
            const colorTocado = nuevoTab[r][c];
            function sink(row, col) {
                if (row<0 || row>=10 || col<0 || col>=10 || nuevoTab[row][col] !== colorTocado) return;
                nuevoTab[row][col] = 0;
                sink(row+1, col); sink(row-1, col); sink(row, col+1); sink(row, col-1);
            }
            sink(r, c);

            db.update({
                tablero: nuevoTab,
                turno: (gameState.turno + 1) % keys.length,
                [`players/${myId}/pos`]: {r, c}
            });
        }

        // Emotes
        function sendEmote(e) { db.child('last_emote').set(e + "_" + Math.random()); }
        db.child('last_emote').on('value', (snap) => {
            const val = snap.val();
            if(val) {
                const el = document.createElement('div');
                el.className = 'floating-emote';
                el.innerText = val.split('_')[0];
                document.getElementById('emote-display').appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        });

        function resetTotal() {
            if(confirm("¿Reiniciar sala?")) db.set(null).then(() => location.reload());
        }
    </script>
</body>
</html>
