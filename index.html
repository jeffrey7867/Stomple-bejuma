<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOMPLE PRO - UNESR FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --admin: #f59e0b; --loss: #ef4444; --win: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #top-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; background: rgba(0,0,0,0.2); }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; display: inline-block; }
        
        #board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; width: 92vw; max-width: 380px; aspect-ratio: 1/1; margin: 10px auto; background: #1e293b; padding: 10px; border-radius: 12px; }
        .marble { width: 100%; height: 100%; border-radius: 50%; cursor: pointer; position: relative; }
        .c1 { background: radial-gradient(circle, #ff4d4d, #990000) !important; }
        .c2 { background: radial-gradient(circle, #4da6ff, #0044cc) !important; }
        .c3 { background: radial-gradient(circle, #ffcc00, #b38f00) !important; }
        .c4 { background: radial-gradient(circle, #df80ff, #7a0099) !important; }
        .c5 { background: radial-gradient(circle, #66ff66, #008000) !important; }
        .c6 { background: radial-gradient(circle, #a6a6a6, #333333) !important; }
        .stomped { background: #0f172a !important; opacity: 0.1; transform: scale(0.6); pointer-events: none; }

        .p-token { position: absolute; width: 80%; height: 80%; top: 10%; left: 10%; border: 2px solid white; border-radius: 50%; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 5px #000; z-index: 10; }
        .my-token { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }

        #admin-panel { display: none; background: #1e293b; border-top: 2px solid var(--admin); padding: 10px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .admin-btns { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="full-screen">
        <h2 style="color: var(--accent);">STOMPLE UNESR</h2>
        <div id="color-opts" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin: 20px;"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn" style="background:var(--accent)">ENTRAR A JUGAR</button>
    </div>

    <div id="win-screen" class="full-screen" style="display:none">
        <h1 style="font-size: 4rem;">🏆</h1>
        <h2 id="winner-text"></h2>
        <button onclick="reiniciarTodo()" id="host-reset-win" class="btn" style="display:none; background:var(--win)">NUEVA PARTIDA</button>
    </div>

    <div id="game-ui" style="display:none; flex-direction: column; height: 100%;">
        <div id="top-bar">
            <span>Color: <span id="my-dot" class="dot"></span></span>
            <button onclick="salir()" class="btn" style="background:var(--loss); padding: 5px 10px; font-size: 0.7rem;">SALIR</button>
        </div>
        <div id="board"></div>
        <div id="status-msg" style="text-align:center; font-weight:bold; color:var(--accent); margin: 5px;"></div>
        
        <div id="admin-panel">
            <div style="color:var(--admin); font-size:0.6rem; font-weight:bold; margin-bottom:5px;">CONTROL DE HOST</div>
            <div class="admin-btns">
                <div id="kick-list" style="display:flex; gap:5px; overflow-x:auto; flex: 1;"></div>
                <button onclick="reiniciarTodo()" class="btn" style="background:var(--admin); padding: 8px; font-size: 0.7rem;">REINICIAR TABLERO</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const ref = firebase.database().ref('stomple_unesr_v9'); // Nueva versión para limpiar datos viejos

        let myId = localStorage.getItem('stomple_id') || "U-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('stomple_id', myId);
        let selectedColor = null;
        let localData = { players: {}, tablero: null, turno: 0, host: "" };

        ref.on('value', (snap) => {
            localData = snap.val() || { players: {}, tablero: null, turno: 0, host: "" };
            const players = localData.players || {};
            const keys = Object.keys(players);

            if (players[myId]) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                document.getElementById('my-dot').className = 'dot c' + players[myId].color;
                
                // Lógica de Host
                const isHost = localData.host === myId;
                document.getElementById('admin-panel').style.display = isHost ? 'block' : 'none';
                document.getElementById('host-reset-win').style.display = isHost ? 'block' : 'none';
                
                checkVictory(keys);
                renderBoard(keys);
                if (isHost) renderKicks(keys);
            } else {
                renderSelector();
            }
        });

        function renderSelector() {
            const container = document.getElementById('color-opts');
            container.innerHTML = '';
            const taken = Object.values(localData.players || {}).map(p => p.color);
            for (let i = 1; i <= 6; i++) {
                const isTaken = taken.includes(i);
                const div = document.createElement('div');
                div.className = 'marble c' + i + (isTaken ? ' stomped' : '');
                div.style.width = '60px'; div.style.height = '60px';
                if (!isTaken) div.onclick = () => {
                    selectedColor = i;
                    document.getElementById('join-btn').disabled = false;
                    container.querySelectorAll('.marble').forEach(m => m.style.boxShadow = 'none');
                    div.style.boxShadow = '0 0 15px white';
                };
                container.appendChild(div);
            }
        }

        async function unirse() {
            let up = {};
            if (!localData.host || localData.host === "") {
                up.host = myId;
                up.turno = 0; 
                up.tablero = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
            }
            const pNum = Object.keys(localData.players || {}).length + 1;
            up['players/' + myId] = { color: selectedColor, pos: {r:-1, c:-1}, pNum: pNum, status: 'playing' };
            ref.update(up);
        }

        function renderBoard(keys) {
            const b = document.getElementById('board');
            if (!localData.tablero) return;
            b.innerHTML = '';
            localData.tablero.forEach((fila, r) => {
                fila.forEach((color, c) => {
                    const m = document.createElement('div');
                    m.className = 'marble c' + color + (color === 0 ? ' stomped' : '');
                    
                    keys.forEach(id => {
                        const p = localData.players[id];
                        if (p.pos.r === r && p.pos.c === c) {
                            const t = document.createElement('div');
                            t.className = 'p-token' + (id === myId ? ' my-token' : '');
                            t.innerText = id === myId ? 'YO' : 'P' + p.pNum;
                            m.appendChild(t);
                        }
                    });
                    m.onclick = () => mover(r, c, keys);
                    b.appendChild(m);
                });
            });

            const actualId = keys[localData.turno];
            const statusEl = document.getElementById('status-msg');
            if (actualId === myId) {
                statusEl.innerText = "⭐ TU TURNO ⭐";
                statusEl.style.color = "var(--accent)";
            } else {
                statusEl.innerText = "Turno de P" + (localData.players[actualId]?.pNum || "?");
                statusEl.style.color = "white";
            }
        }

        function mover(r, c, keys) {
            const p = localData.players[myId];
            const actualId = keys[localData.turno];
            
            // VALIDACIÓN DE TURNO ESTRICTA
            if (actualId !== myId || p.status === 'eliminated') return;

            const esAdy = Math.abs(p.pos.r - r) <= 1 && Math.abs(p.pos.c - c) <= 1;
            
            // Regla de entrada
            if (p.pos.r === -1) {
                if (r !== 0 && r !== 9 && c !== 0 && c !== 9) return;
            } else {
                // Regla de movimiento (Adyacente o salto a tu color)
                if (!esAdy && localData.tablero[r][c] !== p.color) return;
            }
            
            let nt = JSON.parse(JSON.stringify(localData.tablero));
            const target = nt[r][c];
            if (target === 0) return;

            const hundir = (rr, cc) => {
                if (rr < 0 || rr >= 10 || cc < 0 || cc >= 10 || nt[rr][cc] !== target) return;
                nt[rr][cc] = 0;
                hundir(rr + 1, cc); hundir(rr - 1, cc); hundir(rr, cc + 1); hundir(rr, cc - 1);
            };
            
            hundir(r, c);
            ref.update({ tablero: nt, [`players/${myId}/pos`]: {r, c} });
            pasarTurno(keys);
        }

        function pasarTurno(keys) {
            let n = (localData.turno + 1) % keys.length;
            // Saltar jugadores eliminados
            let attempts = 0;
            while (localData.players[keys[n]].status === 'eliminated' && attempts < keys.length) {
                n = (n + 1) % keys.length;
                attempts++;
            }
            ref.child('turno').set(n);
        }

        function checkVictory(keys) {
            const active = keys.filter(k => localData.players[k] && localData.players[k].status === 'playing');
            if (active.length === 1 && keys.length > 1) {
                document.getElementById('win-screen').style.display = 'flex';
                document.getElementById('winner-text').innerText = '🏆 P' + localData.players[active[0]].pNum + ' GANA';
            } else {
                document.getElementById('win-screen').style.display = 'none';
            }
        }

        function renderKicks(keys) {
            const list = document.getElementById('kick-list');
            list.innerHTML = '';
            keys.forEach(id => {
                if (id !== myId) {
                    const b = document.createElement('button');
                    b.innerText = 'EXPULSAR P' + localData.players[id].pNum;
                    b.style = "background:var(--loss); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:9px; white-space:nowrap;";
                    b.onclick = () => ref.child('players/'+id).remove();
                    list.appendChild(b);
                }
            });
        }

        function reiniciarTodo() {
            const nt = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
            const keys = Object.keys(localData.players);
            let up = { tablero: nt, turno: 0 };
            keys.forEach(id => { 
                up[`players/${id}/pos`] = {r:-1, c:-1}; 
                up[`players/${id}/status`] = 'playing'; 
            });
            ref.update(up);
        }

        function salir() {
            const keys = Object.keys(localData.players);
            if (localData.host === myId) {
                const nextHost = keys.find(k => k !== myId);
                ref.child('host').set(nextHost || "");
            }
            ref.child('players/'+myId).remove().then(() => location.reload());
        }
    </script>
</body>
</html>
