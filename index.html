<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stomple Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-screen" class="screen">
        <h1 class="logo">STOMPLE</h1>
        <div id="color-opts" class="grid-picker"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn-primary">ENTRAR</button>
    </div>

    <div id="game-ui" class="screen" style="display:none;">
        <header class="app-bar">
            <span id="status-msg">Cargando...</span>
            <button onclick="salir()" class="btn-exit">SALIR</button>
        </header>

        <main class="board-zone">
            <div id="board"></div>
        </main>

        <footer class="controls">
            <div id="chat-box" class="chat-text">¡Suerte!</div>
            <div class="emote-row">
                <button onclick="enviarAccion('😂')">😂</button>
                <button onclick="enviarAccion('🔥')">🔥</button>
                <button onclick="enviarAccion('😱')">😱</button>
                <button onclick="enviarAccion('🤫')">🤫</button>
            </div>
            <div id="admin-panel" style="display:none;" class="host-box">
                <div id="kick-list" class="kicks"></div>
                <button onclick="reiniciarTodo()" class="btn-reset">REINICIAR</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
