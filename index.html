<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOMPLE PRO - UNESR FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --admin: #f59e0b; --loss: #ef4444; --win: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #top-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; background: rgba(0,0,0,0.2); }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; display: inline-block; }
        
        #board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; width: 92vw; max-width: 380px; aspect-ratio: 1/1; margin: 10px auto; background: #1e293b; padding: 10px; border-radius: 12px; transition: transform 0.4s ease; position: relative; overflow: hidden; }
        .marble { width: 100%; height: 100%; border-radius: 50%; cursor: pointer; position: relative; transition: all 0.3s ease; }
        .c1 { background: radial-gradient(circle, #ff4d4d, #990000) !important; }
        .c2 { background: radial-gradient(circle, #4da6ff, #0044cc) !important; }
        .c3 { background: radial-gradient(circle, #ffcc00, #b38f00) !important; }
        .c4 { background: radial-gradient(circle, #df80ff, #7a0099) !important; }
        .c5 { background: radial-gradient(circle, #66ff66, #008000) !important; }
        .c6 { background: radial-gradient(circle, #a6a6a6, #333333) !important; }
        .stomped { background: #0f172a !important; opacity: 0.15; transform: scale(0.65); pointer-events: none; }

        @keyframes crush { 0% {transform:scale(1) rotate(0deg); opacity:1;} 30%{transform:scale(1.15) rotate(3deg); opacity:0.9;} 60%{transform:scale(0.75) rotate(-3deg); opacity:0.6;} 100%{transform:scale(0.65) rotate(0deg); opacity:0.15;} }
        .crushing { animation: crush 0.6s ease-out forwards; pointer-events: none; }

        @keyframes shake { 0%,100%{transform:translateX(0);} 10%,30%,50%,70%,90%{transform:translateX(-2px);} 20%,40%,60%,80%{transform:translateX(2px);} }
        .shake-once { animation: shake 0.4s ease; }

        @keyframes floatEmoji { 0%{transform:translate(-50%,-50%) scale(0.5) translateY(0); opacity:0;} 20%{opacity:1; transform:translate(-50%,-50%) scale(1.3) translateY(-30%);} 80%{opacity:1; transform:translate(-50%,-50%) scale(1.1) translateY(-140%);} 100%{opacity:0; transform:translate(-50%,-50%) scale(0.8) translateY(-200%);} }
        .reaction-emoji { position:absolute; font-size:4rem; pointer-events:none; z-index:50; left:50%; top:50%; animation:floatEmoji 2.8s ease-out forwards; }

        @keyframes pulse { 0%,100%{box-shadow:0 0 10px var(--accent);} 50%{box-shadow:0 0 25px var(--accent);} }
        .highlight-jump { box-shadow: 0 0 20px var(--accent) !important; animation: pulse 1.5s infinite; }

        .p-token { position:absolute; width:80%; height:80%; top:10%; left:10%; border:2px solid white; border-radius:50%; font-size:0.65rem; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow:0 0 5px #000; z-index:10; }
        .my-token { border-color:var(--accent); box-shadow:0 0 12px var(--accent); }

        .full-screen { position:fixed; inset:0; background:var(--bg); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .btn { padding:12px 25px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; color:white; }

        #admin-panel { display:none; background:#1e293b; border-top:2px solid var(--admin); padding:10px; position:fixed; bottom:0; width:100%; box-sizing:border-box; }
        #alive-count { text-align:center; font-size:0.9rem; margin:6px 0; color:#94a3b8; }

        /* INDICADOR DE COLORES DE JUGADORES */
        #player-colors-indicator {
            background: rgba(30,41,59,0.8);
            padding: 8px 12px;
            border-radius: 8px;
            margin: 6px auto;
            max-width: 92vw;
            font-size: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            backdrop-filter: blur(4px);
        }
        .player-color-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .player-color-item .dot { width: 18px; height: 18px; border: 2px solid white; }

        #reaction-btn { position:fixed; bottom:20px; right:20px; font-size:2.2rem; background:rgba(255,255,255,0.15); border:none; border-radius:50%; width:60px; height:60px; cursor:pointer; z-index:100; backdrop-filter:blur(4px); box-shadow:0 4px 15px rgba(0,0,0,0.4); }
        #emoji-picker { position:fixed; bottom:90px; right:20px; background:#1e293b; border-radius:12px; padding:12px; display:none; flex-wrap:wrap; gap:12px; z-index:110; box-shadow:0 4px 20px rgba(0,0,0,0.6); max-width:200px; }
        #emoji-picker span { font-size:2.2rem; cursor:pointer; transition:transform 0.15s; }
        #emoji-picker span:hover { transform:scale(1.4); }
    </style>
</head>
<body>

    <div id="setup-screen" class="full-screen">
        <h2 style="color:var(--accent);">STOMPLE UNESR</h2>
        <div id="color-opts" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin:20px;"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn" style="background:var(--accent)">ENTRAR A JUGAR</button>
    </div>

    <div id="win-screen" class="full-screen" style="display:none">
        <h1 style="font-size:6rem;">🏆</h1>
        <h2 id="winner-text" style="font-size:2.5rem; margin:20px 0;"></h2>
        <p style="font-size:1.2rem; color:#94a3b8;">¡Felicidades! Eres el último en pie</p>
        <button onclick="reiniciarTodo()" id="host-reset-win" class="btn" style="display:none; background:var(--win); margin-top:20px; padding:12px 30px;">NUEVA PARTIDA</button>
        <button onclick="salir()" class="btn" style="background:var(--loss); margin-top:15px; padding:10px 25px;">SALIR AL LOBBY</button>
    </div>

    <div id="lose-screen" class="full-screen" style="display:none">
        <h1 style="font-size:5rem;">😔</h1>
        <h2 id="lose-text" style="color:var(--loss);">¡PERDISTE LA PARTIDA!</h2>
        <p id="lose-reason" style="font-size:1.1rem; margin:15px 20px;">Te quedaste sin movimientos posibles</p>
        <button onclick="salir()" class="btn" style="background:var(--loss)">SALIR AL LOBBY</button>
    </div>

    <div id="game-ui" style="display:none; flex-direction:column; height:100%; position:relative;">
        <div id="top-bar">
            <span>Color: <span id="my-dot" class="dot"></span></span>
            <button onclick="salirConConfirm()" class="btn" style="background:var(--loss); padding:5px 10px; font-size:0.7rem;">SALIR</button>
        </div>

        <!-- INDICADOR DE COLORES -->
        <div id="player-colors-indicator"></div>

        <div id="alive-count">Jugadores vivos: <span id="alive-num">?</span></div>
        <div id="board"></div>
        <div id="status-msg" style="text-align:center; font-weight:bold; color:var(--accent); margin:8px 12px; min-height:1.4em;"></div>
        
        <div id="admin-panel">
            <div style="color:var(--admin); font-size:0.6rem; font-weight:bold; margin-bottom:5px;">CONTROL DE HOST</div>
            <div class="admin-btns">
                <div id="kick-list" style="display:flex; gap:5px; overflow-x:auto; flex:1;"></div>
                <button onclick="reiniciarTodo()" class="btn" style="background:var(--admin); padding:8px; font-size:0.7rem;">REINICIAR</button>
            </div>
        </div>

        <button id="reaction-btn" onclick="toggleEmojiPicker()">😀</button>
        <div id="emoji-picker">
            <span onclick="sendReaction('🔥')">🔥</span>
            <span onclick="sendReaction('😂')">😂</span>
            <span onclick="sendReaction('👏')">👏</span>
            <span onclick="sendReaction('😱')">😱</span>
            <span onclick="sendReaction('💪')">💪</span>
            <span onclick="sendReaction('❤️')">❤️</span>
            <span onclick="sendReaction('🤯')">🤯</span>
            <span onclick="sendReaction('🎉')">🎉</span>
        </div>
    </div>

    <audio id="sound-stomp" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-apocalyptic-stomp-impact-1219.mp3" type="audio/mpeg">
    </audio>

    <script>
        const config = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const ref = firebase.database().ref('stomple_unesr_v9');
        const reactionsRef = ref.child('reacciones');

        let myId = localStorage.getItem('stomple_id');
        if (!myId) {
            myId = "U-" + (crypto?.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2,10)).slice(0,13);
            localStorage.setItem('stomple_id', myId);
        }

        let selectedColor = null;
        let localData = {};
        let reactionsSubscribed = false;

        ref.on('value', (snap) => {
            const data = snap.val() || { players: {}, tablero: null, turno: 0, host: "" };
            localData = data;

            const players = data.players || {};
            const keys = Object.keys(players);

            if (keys.length === 0) {
                const newBoard = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                ref.set({ tablero: newBoard, turno: 0, host: "", players: {}, reacciones: null });
                document.getElementById('setup-screen').style.display = 'flex';
                hideAllScreens();
                return;
            }

            if (players[myId]) {
                hideAllScreensExcept('game-ui');
                document.getElementById('my-dot').className = 'dot c' + players[myId].color;

                const isHost = data.host === myId;
                document.getElementById('admin-panel').style.display = isHost ? 'block' : 'none';
                document.getElementById('host-reset-win').style.display = isHost ? 'block' : 'none';

                updateAliveCount(players);
                renderPlayerColors(players, keys);
                checkVictoryAndElimination(keys);
                renderBoard(keys);

                if (isHost) renderKicks(keys);

                if (!reactionsSubscribed) {
                    reactionsSubscribed = true;
                    reactionsRef.limitToLast(8).on('child_added', (snap) => {
                        const r = snap.val();
                        if (!r?.emoji) return;
                        const div = document.createElement('div');
                        div.className = 'reaction-emoji';
                        div.textContent = r.emoji;
                        document.getElementById('board').appendChild(div);
                        setTimeout(() => div.remove(), 3500);
                    });
                }
            } else {
                hideAllScreensExcept('setup-screen');
                renderSelector();
            }
        });

        function hideAllScreens() {
            ['game-ui','win-screen','lose-screen'].forEach(id => document.getElementById(id).style.display = 'none');
        }

        function hideAllScreensExcept(showId) {
            hideAllScreens();
            document.getElementById(showId).style.display = 'flex';
        }

        function renderPlayerColors(players, keys) {
            const container = document.getElementById('player-colors-indicator');
            container.innerHTML = '';
            keys.forEach((id, index) => {
                const p = players[id];
                if (!p) return;
                const item = document.createElement('div');
                item.className = 'player-color-item';
                item.innerHTML = `
                    <span class="dot c${p.color}"></span>
                    <span>P\( {p.pNum} \){id === myId ? ' (YO)' : ''}</span>
                    ${p.status === 'eliminated' ? '<span style="color:var(--loss); font-size:0.8em;">[X]</span>' : ''}
                `;
                container.appendChild(item);
            });
        }

        function hasPossibleMoves(p) {
            if (!p || p.status !== 'playing' || p.pos.r === -1) return true;
            const myColor = p.color;
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    if (localData.tablero[r][c] === 0) continue;
                    const ady = Math.abs(p.pos.r - r) <= 1 && Math.abs(p.pos.c - c) <= 1;
                    if (ady || localData.tablero[r][c] === myColor) return true;
                }
            }
            return false;
        }

        function checkVictoryAndElimination(keys) {
            const activePlayers = keys.filter(k => localData.players[k]?.status === 'playing');
            
            // Chequeo de eliminación individual
            if (activePlayers.includes(myId)) {
                const me = localData.players[myId];
                const isMyTurn = keys[localData.turno % keys.length] === myId;
                if (isMyTurn && !hasPossibleMoves(me)) {
                    ref.update({ [`players/${myId}/status`]: 'eliminated' });
                    hideAllScreensExcept('lose-screen');
                }
            }

            // Chequeo de victoria (solo 1 vivo)
            if (activePlayers.length === 1 && keys.length > 1) {
                const winnerId = activePlayers[0];
                const winner = localData.players[winnerId];
                hideAllScreensExcept('win-screen');
                document.getElementById('winner-text').innerText = `¡P${winner.pNum} GANA!`;
                document.getElementById('host-reset-win').style.display = (winnerId === myId) ? 'block' : 'none';
            }
        }

        // Resto de funciones permanecen iguales (renderBoard, mover, unirse, etc.)
        // ... (copia aquí las funciones anteriores que no cambiaron)

        function updateAliveCount(players) {
            const alive = Object.values(players).filter(p => p.status === 'playing').length;
            document.getElementById('alive-num').textContent = alive;
        }

        // ... (incluye aquí renderSelector, unirse, renderBoard, playSound, mover, pasarTurno, renderKicks, reiniciarTodo, salirConConfirm, salir, toggleEmojiPicker, sendReaction)
        // Para no repetir todo el código, asume que mantienes las funciones previas

    </script>
</body>
</html>
