<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOMPLE PRO - UNESR FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --admin: #f59e0b; --loss: #ef4444; --win: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #top-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; background: rgba(0,0,0,0.2); }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; display: inline-block; }
        
        #board { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 4px; 
            width: 92vw; 
            max-width: 380px; 
            aspect-ratio: 1/1; 
            margin: 10px auto; 
            background: #1e293b; 
            padding: 10px; 
            border-radius: 12px; 
            transition: transform 0.4s ease; 
            position: relative; 
            overflow: hidden; 
        }
        .marble { width: 100%; height: 100%; border-radius: 50%; cursor: pointer; position: relative; transition: all 0.3s ease; }
        .c1 { background: radial-gradient(circle, #ff4d4d, #990000) !important; }
        .c2 { background: radial-gradient(circle, #4da6ff, #0044cc) !important; }
        .c3 { background: radial-gradient(circle, #ffcc00, #b38f00) !important; }
        .c4 { background: radial-gradient(circle, #df80ff, #7a0099) !important; }
        .c5 { background: radial-gradient(circle, #66ff66, #008000) !important; }
        .c6 { background: radial-gradient(circle, #a6a6a6, #333333) !important; }
        .stomped { background: #0f172a !important; opacity: 0.15; transform: scale(0.65); pointer-events: none; }

        @keyframes crush {
          0%   { transform: scale(1) rotate(0deg); opacity: 1; }
          30%  { transform: scale(1.15) rotate(3deg); opacity: 0.9; }
          60%  { transform: scale(0.75) rotate(-3deg); opacity: 0.6; }
          100% { transform: scale(0.65) rotate(0deg); opacity: 0.15; }
        }
        .crushing { animation: crush 0.6s ease-out forwards; pointer-events: none; }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
          20%, 40%, 60%, 80% { transform: translateX(2px); }
        }
        .shake-once { animation: shake 0.4s ease; }

        @keyframes floatEmoji {
          0%   { transform: translate(-50%, -50%) scale(0.5) translateY(0); opacity: 0; }
          20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3) translateY(-30%); }
          80%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1) translateY(-140%); }
          100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-200%); }
        }
        .reaction-emoji {
          position: absolute;
          font-size: 4rem;
          pointer-events: none;
          z-index: 50;
          left: 50%;
          top: 50%;
          animation: floatEmoji 2.8s ease-out forwards;
        }

        .p-token { position: absolute; width: 80%; height: 80%; top: 10%; left: 10%; border: 2px solid white; border-radius: 50%; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 5px #000; z-index: 10; }
        .my-token { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }

        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }

        #admin-panel { display: none; background: #1e293b; border-top: 2px solid var(--admin); padding: 10px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .admin-btns { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        #alive-count { text-align: center; font-size: 0.9rem; margin: 6px 0; color: #94a3b8; }

        #reaction-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 2.2rem;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #emoji-picker {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            display: none;
            flex-wrap: wrap;
            gap: 12px;
            z-index: 110;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            max-width: 200px;
        }
        #emoji-picker span {
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.15s;
        }
        #emoji-picker span:hover { transform: scale(1.4); }
    </style>
</head>
<body>

    <div id="setup-screen" class="full-screen">
        <h2 style="color: var(--accent);">STOMPLE UNESR</h2>
        <div id="color-opts" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin: 20px;"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn" style="background:var(--accent)">ENTRAR A JUGAR</button>
    </div>

    <div id="win-screen" class="full-screen" style="display:none">
        <h1 style="font-size: 4rem;">🏆</h1>
        <h2 id="winner-text"></h2>
        <button onclick="reiniciarTodo()" id="host-reset-win" class="btn" style="display:none; background:var(--win)">NUEVA PARTIDA</button>
    </div>

    <div id="game-ui" style="display:none; flex-direction: column; height: 100%; position: relative;">
        <div id="top-bar">
            <span>Color: <span id="my-dot" class="dot"></span></span>
            <button onclick="salirConConfirm()" class="btn" style="background:var(--loss); padding: 5px 10px; font-size: 0.7rem;">SALIR</button>
        </div>
        <div id="alive-count">Jugadores vivos: <span id="alive-num">?</span></div>
        <div id="board"></div>
        <div id="status-msg" style="text-align:center; font-weight:bold; color:var(--accent); margin: 8px 12px; min-height:1.4em;"></div>
        
        <div id="admin-panel">
            <div style="color:var(--admin); font-size:0.6rem; font-weight:bold; margin-bottom:5px;">CONTROL DE HOST</div>
            <div class="admin-btns">
                <div id="kick-list" style="display:flex; gap:5px; overflow-x:auto; flex: 1;"></div>
                <button onclick="reiniciarTodo()" class="btn" style="background:var(--admin); padding: 8px; font-size: 0.7rem;">REINICIAR</button>
            </div>
        </div>

        <!-- Botón y picker de reacciones -->
        <button id="reaction-btn" onclick="toggleEmojiPicker()">😀</button>
        <div id="emoji-picker">
            <span onclick="sendReaction('🔥')">🔥</span>
            <span onclick="sendReaction('😂')">😂</span>
            <span onclick="sendReaction('👏')">👏</span>
            <span onclick="sendReaction('😱')">😱</span>
            <span onclick="sendReaction('💪')">💪</span>
            <span onclick="sendReaction('❤️')">❤️</span>
            <span onclick="sendReaction('🤯')">🤯</span>
            <span onclick="sendReaction('🎉')">🎉</span>
        </div>
    </div>

    <!-- Sonidos royalty-free -->
    <audio id="sound-stomp" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-apocalyptic-stomp-impact-1219.mp3" type="audio/mpeg">
    </audio>

    <script>
        const config = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(config);
        const ref = firebase.database().ref('stomple_unesr_v9');
        const reactionsRef = ref.child('reacciones');

        let myId = localStorage.getItem('stomple_id');
        if (!myId) {
            myId = "U-" + (crypto?.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2, 10)).slice(0,13);
            localStorage.setItem('stomple_id', myId);
        }

        let selectedColor = null;
        let localData = { players: {}, tablero: null, turno: 0, host: "" };

        ref.on('value', (snap) => {
            const data = snap.val() || { players: {}, tablero: null, turno: 0, host: "" };
            localData = data;

            const players = data.players || {};
            const playerKeys = Object.keys(players);

            if (playerKeys.length === 0) {
                const newBoard = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                ref.set({
                    tablero: newBoard,
                    turno: 0,
                    host: "",
                    players: {},
                    reacciones: null
                }).catch(console.error);
                document.getElementById('setup-screen').style.display = 'flex';
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('win-screen').style.display = 'none';
                return;
            }

            if (players[myId]) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                document.getElementById('my-dot').className = 'dot c' + players[myId].color;

                const isHost = data.host === myId;
                document.getElementById('admin-panel').style.display = isHost ? 'block' : 'none';
                document.getElementById('host-reset-win').style.display = isHost ? 'block' : 'none';

                updateAliveCount(players);
                checkVictory(playerKeys);
                renderBoard(playerKeys);
                if (isHost) renderKicks(playerKeys);
            } else {
                renderSelector();
            }
        });

        // Reacciones en tiempo real
        reactionsRef.limitToLast(8).on('child_added', (snap) => {
            const reaction = snap.val();
            if (!reaction?.emoji) return;

            const div = document.createElement('div');
            div.className = 'reaction-emoji';
            div.textContent = reaction.emoji;
            document.getElementById('board').appendChild(div);

            setTimeout(() => div.remove(), 3500);
        });

        function toggleEmojiPicker() {
            const picker = document.getElementById('emoji-picker');
            picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendReaction(emoji) {
            reactionsRef.push({
                emoji,
                sender: myId,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // Limpieza automática (mantener \~20 últimas)
            reactionsRef.orderByChild('timestamp').limitToLast(21).once('value', snap => {
                if (snap.numChildren() > 20) {
                    const firstKey = Object.keys(snap.val())[0];
                    reactionsRef.child(firstKey).remove();
                }
            });

            toggleEmojiPicker();
        }

        function updateAliveCount(players) {
            const alive = Object.values(players).filter(p => p.status === 'playing').length;
            document.getElementById('alive-num').textContent = alive;
        }

        function renderSelector() {
            const container = document.getElementById('color-opts');
            container.innerHTML = '';
            const taken = Object.values(localData.players || {}).map(p => p.color);
            for (let i = 1; i <= 6; i++) {
                const isTaken = taken.includes(i);
                const div = document.createElement('div');
                div.className = 'marble c' + i + (isTaken ? ' stomped' : '');
                div.style.width = '60px'; div.style.height = '60px';
                if (!isTaken) {
                    div.onclick = () => {
                        selectedColor = i;
                        document.getElementById('join-btn').disabled = false;
                        container.querySelectorAll('.marble').forEach(m => m.style.boxShadow = 'none');
                        div.style.boxShadow = '0 0 15px white';
                    };
                }
                container.appendChild(div);
            }
        }

        async function unirse() {
            if (!selectedColor) return;
            try {
                await ref.transaction(current => {
                    if (!current) current = { players: {}, tablero: null, turno: 0, host: "" };
                    if (current.players?.[myId]) return;
                    const updates = {};
                    if (!current.host || current.host === "") {
                        updates.host = myId;
                        updates.turno = 0;
                        updates.tablero = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                    }
                    const playerCount = Object.keys(current.players || {}).length;
                    updates[`players/${myId}`] = {
                        color: selectedColor,
                        pos: { r: -1, c: -1 },
                        pNum: playerCount + 1,
                        status: 'playing'
                    };
                    return { ...current, ...updates };
                });
            } catch (err) {
                console.error("Error al unirse:", err);
                alert("No se pudo entrar. Intenta de nuevo.");
            }
        }

        function renderBoard(keys) {
            const b = document.getElementById('board');
            if (!localData.tablero) return;
            b.innerHTML = '';

            localData.tablero.forEach((fila, r) => {
                fila.forEach((color, c) => {
                    const m = document.createElement('div');
                    m.className = 'marble c' + color + (color === 0 ? ' stomped' : '');

                    keys.forEach(id => {
                        const p = localData.players[id];
                        if (p?.pos?.r === r && p?.pos?.c === c) {
                            const t = document.createElement('div');
                            t.className = 'p-token' + (id === myId ? ' my-token' : '');
                            t.innerText = id === myId ? 'YO' : 'P' + p.pNum;
                            m.appendChild(t);
                        }
                    });

                    m.onclick = () => mover(r, c, keys);
                    b.appendChild(m);
                });
            });

            const actualId = keys[localData.turno % keys.length];
            const statusEl = document.getElementById('status-msg');
            const me = localData.players[myId];

            if (actualId === myId && me?.status !== 'eliminated') {
                statusEl.innerText = "⭐ ¡TU TURNO! ⭐";
                statusEl.style.color = "var(--accent)";
            } else if (me?.status === 'eliminated') {
                statusEl.innerText = "Estás eliminado 😔";
                statusEl.style.color = "var(--loss)";
            } else {
                const turnoPlayer = localData.players[actualId];
                statusEl.innerText = `Turno de P${turnoPlayer?.pNum || "?"}`;
                statusEl.style.color = "white";
            }
        }

        function playSound(type) {
            const el = document.getElementById(`sound-${type}`);
            if (el) {
                el.currentTime = 0;
                el.volume = 0.5;
                el.play().catch(() => {});
            }
        }

        function mover(r, c, keys) {
            const p = localData.players[myId];
            if (!p || p.status === 'eliminated') return;

            const actualId = keys[localData.turno % keys.length];
            if (actualId !== myId) return;

            const esAdy = Math.abs(p.pos.r - r) <= 1 && Math.abs(p.pos.c - c) <= 1;

            if (p.pos.r === -1) {
                if (r !== 0 && r !== 9 && c !== 0 && c !== 9) return;
            } else if (!esAdy && localData.tablero[r][c] !== p.color) {
                return;
            }

            const target = localData.tablero[r][c];
            if (target === 0) return;

            const nt = localData.tablero.map(row => [...row]);

            const crushedCells = [];
            const stack = [[r, c]];
            while (stack.length) {
                const [rr, cc] = stack.pop();
                if (rr < 0 || rr >= 10 || cc < 0 || cc >= 10 || nt[rr][cc] !== target) continue;
                nt[rr][cc] = 0;
                crushedCells.push({r: rr, c: cc});
                stack.push([rr+1, cc], [rr-1, cc], [rr, cc+1], [rr, cc-1]);
            }

            playSound('stomp');

            crushedCells.forEach(pos => {
                const idx = pos.r * 10 + pos.c;
                const cell = b.children[idx];
                if (cell) {
                    cell.classList.add('crushing');
                    setTimeout(() => {
                        cell.classList.remove('crushing');
                        cell.classList.add('stomped');
                    }, 700);
                }
            });

            document.getElementById('board').classList.add('shake-once');
            setTimeout(() => document.getElementById('board').classList.remove('shake-once'), 500);

            ref.update({ 
                tablero: nt, 
                [`players/${myId}/pos`]: { r, c } 
            }).then(() => pasarTurno(keys));
        }

        function pasarTurno(keys) {
            let n = (localData.turno + 1) % keys.length;
            let attempts = 0;
            while (localData.players[keys[n]]?.status === 'eliminated' && attempts < keys.length + 1) {
                n = (n + 1) % keys.length;
                attempts++;
            }
            ref.child('turno').set(n);
        }

        function checkVictory(keys) {
            const active = keys.filter(k => localData.players[k]?.status === 'playing');
            const winEl = document.getElementById('win-screen');
            if (active.length === 1 && keys.length > 1) {
                winEl.style.display = 'flex';
                document.getElementById('winner-text').innerText = `🏆 P${localData.players[active[0]].pNum} GANA`;
            } else {
                winEl.style.display = 'none';
            }
        }

        function renderKicks(keys) {
            const list = document.getElementById('kick-list');
            list.innerHTML = '';
            keys.forEach(id => {
                if (id !== myId) {
                    const btn = document.createElement('button');
                    btn.innerText = `EXPULSAR P${localData.players[id].pNum}`;
                    btn.style.cssText = "background:var(--loss); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:9px; white-space:nowrap;";
                    btn.onclick = () => ref.child('players/'+id).remove();
                    list.appendChild(btn);
                }
            });
        }

        function reiniciarTodo() {
            if (localData.host !== myId) return;
            const nt = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
            const updates = { tablero: nt, turno: 0 };
            Object.keys(localData.players || {}).forEach(id => {
                updates[`players/${id}/pos`] = { r: -1, c: -1 };
                updates[`players/${id}/status`] = 'playing';
            });
            ref.update(updates);
        }

        function salirConConfirm() {
            if (confirm("¿Seguro que quieres salir?")) salir();
        }

        function salir() {
            if (localData.host === myId) {
                const next = Object.keys(localData.players || {}).find(k => k !== myId) || "";
                ref.child('host').set(next);
            }
            ref.child('players/' + myId).remove().then(() => location.reload());
        }
    </script>
</body>
</html>
