<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stomple Pro UNESR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1 class="logo">STOMPLE<span>UNESR</span></h1>
        <div id="color-opts" class="color-grid"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn-main">JUGAR AHORA</button>
        <button onclick="toggleReglas()" class="btn-link">Ver Reglas</button>
    </div>

    <div id="game-ui" class="screen" style="display:none;">
        <header class="app-header">
            <div class="user-info">
                <span id="my-dot" class="mini-dot"></span>
                <span id="status-msg">Cargando...</span>
            </div>
            <button onclick="salir()" class="btn-exit">SALIR</button>
        </header>

        <main class="game-content">
            <div id="board"></div>
        </main>

        <footer class="app-footer">
            <div class="chat-display" id="chat-box">¡Bienvenidos a Stomple!</div>
            <div class="emotes-bar">
                <button onclick="enviarAccion('😂')">😂</button>
                <button onclick="enviarAccion('🔥')">🔥</button>
                <button onclick="enviarAccion('😱')">😱</button>
                <button onclick="enviarAccion('🤫')">🤫</button>
            </div>
            
            <div id="admin-panel" class="admin-shelf" style="display:none">
                <div id="kick-list"></div>
                <button onclick="reiniciarTodo()" class="btn-reset">REINICIAR TABLERO</button>
            </div>
        </footer>
    </div>

    <div id="rules-modal" class="overlay" style="display:none" onclick="toggleReglas()">
        <div class="modal">
            <h3>Reglas Rápidas</h3>
            <p>• Entra por los bordes.<br>• Salta a tu color o mueve a un lado.<br>• Hunde grupos del mismo color.</p>
            <button class="btn-main">ENTENDIDO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
