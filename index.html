<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stomple Pro - UNESR</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="full-screen">
        <h2 class="text-accent">STOMPLE UNESR</h2>
        <div id="color-opts" class="grid-colors"></div>
        <button id="join-btn" disabled onclick="unirse()" class="btn btn-accent">ENTRAR A JUGAR</button>
    </div>

    <div id="win-screen" class="full-screen" style="display:none">
        <h1 class="icon-win">🏆</h1>
        <h2 id="winner-text"></h2>
        <button onclick="reiniciarTodo()" id="host-reset-btn" class="btn btn-win" style="display:none">NUEVA PARTIDA</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="top-bar">
            <span>Color: <span id="my-dot" class="dot"></span></span>
            <button onclick="salir()" class="btn btn-loss btn-small">SALIR</button>
        </div>
        <div id="board"></div>
        <div id="status-msg"></div>
        <div id="admin-panel">
            <div class="admin-label">HOST: EXPULSAR JUGADORES</div>
            <div id="kick-list" class="flex-scroll"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
