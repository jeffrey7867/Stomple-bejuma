<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐 STOMPLE PRO - BEJUMA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --win: #22c55e; --loss: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* Pantallas */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; }

        /* Selector de Color */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .color-opt { width: 55px; height: 55px; border-radius: 50%; border: 4px solid transparent; cursor: pointer; position: relative; }
        .color-opt.taken { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .color-opt.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px white; }
        .taken-txt { position: absolute; width: 100%; bottom: -18px; font-size: 8px; color: var(--loss); font-weight: bold; }

        /* Tablero */
        #board { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
            width: 92vw; max-width: 420px; aspect-ratio: 1/1; 
            margin: 0 auto; background: #1e293b; padding: 10px; border-radius: 12px; position: relative;
        }
        .marble { width: 100%; height: 100%; border-radius: 50%; cursor: pointer; position: relative; transition: 0.2s; }
        .stomped { opacity: 0.1; transform: scale(0.8); pointer-events: none; }
        
        /* Colores Canicas */
        .c1 { background: radial-gradient(circle, #ff4444, #880000); } .c2 { background: radial-gradient(circle, #44aaff, #004488); }
        .c3 { background: radial-gradient(circle, #ffbb00, #886600); } .c4 { background: radial-gradient(circle, #cc44ff, #6b21a8); }
        .c5 { background: radial-gradient(circle, #4ade80, #166534); } .c6 { background: radial-gradient(circle, #555555, #000000); }

        /* Fichas Stomple */
        .p-token { 
            position: absolute; width: 85%; height: 85%; top: 7.5%; left: 7.5%;
            border: 3px solid white; border-radius: 50%; font-weight: bold; font-size: 0.6rem;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .my-token { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Admin y Salida */
        .admin-btn { display: none; background: var(--loss); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 0.7rem; }
        .es-admin .admin-btn { display: inline-block; }
        .btn-exit { background: transparent; color: #64748b; border: 1px solid #334155; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay" style="display: flex;">
        <h1>🎨 STOMPLE ONLINE</h1>
        <p style="font-size: 0.9rem; color: #94a3b8;">Elige tu color para entrar al tablero:</p>
        <div class="color-grid" id="color-options"></div>
        <button id="start-btn" class="btn-main" disabled onclick="unirse()">COMENZAR JUEGO</button>
    </div>

    <div id="end-screen" class="overlay">
        <h1 id="end-title"></h1>
        <p id="end-msg" style="margin-bottom: 20px;"></p>
        <button class="btn-main" onclick="location.reload()">REINTENTAR</button>
    </div>

    <div id="game-ui" style="display: none; padding: 10px;">
        <div id="scoreboard" style="display:flex; justify-content:center; gap:8px; margin-bottom:12px;"></div>
        <div id="board"></div>
        <div id="msg" style="margin: 15px; font-weight: bold; color: var(--accent); min-height: 24px;">Sincronizando...</div>
        
        <button class="btn-exit" onclick="salir()">Abandonar Partida</button><br>
        <button id="admin-reset-btn" class="admin-btn" onclick="resetAdmin()">🧹 LIMPIAR TODO (ADMIN)</button>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { databaseURL: "https://stomple-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('stomple_bejuma_final_v2');

        let myId = localStorage.getItem('stomple_id') || "U-" + Math.floor(Math.random() * 9999);
        localStorage.setItem('stomple_id', myId);
        
        // El primer ID que entra será Admin automáticamente para pruebas
        const ADMIN_ID = myId; 
        document.body.classList.add('es-admin');

        let selectedColor = null;
        let gameState = { players: {}, tablero: null, turno: 0 };

        // ESCUCHAR CAMBIOS
        db.on('value', (snap) => {
            const data = snap.val();
            if (data) gameState = data;

            if (gameState.players && gameState.players[myId]) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                checkStatus();
                renderGame();
            } else {
                document.getElementById('setup-screen').style.display = 'flex';
                document.getElementById('game-ui').style.display = 'none';
                renderSelector();
            }
        });

        function renderSelector() {
            const container = document.getElementById('color-options');
            container.innerHTML = '';
            const taken = Object.values(gameState.players || {}).map(p => p.color);
            for (let i = 1; i <= 6; i++) {
                const isTaken = taken.includes(i);
                const opt = document.createElement('div');
                opt.className = `color-opt c${i} ${isTaken ? 'taken' : ''} ${selectedColor === i ? 'selected' : ''}`;
                if (!isTaken) {
                    opt.onclick = () => { selectedColor = i; document.getElementById('start-btn').disabled = false; renderSelector(); };
                } else {
                    opt.innerHTML = '<span class="taken-txt">OCUPADO</span>';
                }
                container.appendChild(opt);
            }
        }

        async function unirse() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.innerText = "Entrando...";

            // Si no hay tablero, lo creamos antes de entrar
            if (!gameState.tablero) {
                const t = Array.from({length:10}, () => Array.from({length:10}, () => Math.floor(Math.random()*6)+1));
                await db.child('tablero').set(t);
                await db.child('turno').set(0);
            }

            db.child('players/' + myId).set({
                color: selectedColor,
                pos: {r:-1, c:-1},
                status: 'active'
            });
        }

        function renderGame() {
            const boardEl = document.getElementById('board');
            const scoreEl = document.getElementById('scoreboard');
            boardEl.innerHTML = ''; scoreEl.innerHTML = '';
            const keys = Object.keys(gameState.players);

            keys.forEach((id, i) => {
                const p = gameState.players[id];
                scoreEl.innerHTML += `<div style="padding:5px 10px; background:#1e293b; border-radius:5px; border-bottom:3px solid ${gameState.turno===i? 'var(--accent)':'transparent'}">P${i+1}</div>`;
            });

            gameState.tablero.forEach((fila, r) => {
                fila.forEach((color, c) => {
                    const m = document.createElement('div');
                    m.className = `marble c${color} ${color === 0 ? 'stomped' : ''}`;
                    
                    // Dibujar fichas (Stomples)
                    keys.forEach((id, idx) => {
                        const p = gameState.players[id];
                        if(p && p.pos.r === r && p.pos.c === c) {
                            const token = document.createElement('div');
                            token.className = `p-token c${p.color} ${id === myId ? 'my-token' : ''}`;
                            token.innerText = id === myId ? 'YO' : `P${idx+1}`;
                            m.appendChild(token);
                        }
                    });

                    m.onclick = () => procesarMovimiento(r, c, keys);
                    boardEl.appendChild(m);
                });
            });
            
            document.getElementById('msg').innerText = (keys[gameState.turno] === myId) ? "⭐ ¡TU TURNO! ⭐" : "Esperando movimiento...";
        }

        function procesarMovimiento(r, c, keys) {
            if (keys[gameState.turno] !== myId) return;
            const miInfo = gameState.players[myId];
            const miPos = miInfo.pos;
            const esAdy = Math.abs(miPos.r - r) <= 1 && Math.abs(miPos.c - c) <= 1;

            // Regla: Borde al inicio, Adyacente o Vuelo a color después
            if (miPos.r === -1) {
                if (r!==0 && r!==9 && c!==0 && c!==9) return;
            } else {
                if (!esAdy && gameState.tablero[r][c] !== selectedColor) return;
            }

            let nuevoTab = JSON.parse(JSON.stringify(gameState.tablero));
            const colorTocado = nuevoTab[r][c];
            
            function hundir(row, col) {
                if (row<0 || row>=10 || col<0 || col>=10 || nuevoTab[row][col] !== colorTocado) return;
                nuevoTab[row][col] = 0;
                hundir(row+1, col); hundir(row-1, col); hundir(row, col+1); hundir(row, col-1);
            }
            hundir(r, c);

            db.update({
                tablero: nuevoTab,
                turno: (gameState.turno + 1) % keys.length,
                [`players/${myId}/pos`]: {r, c}
            });
        }

        function checkStatus() {
            const actives = Object.values(gameState.players).filter(p => p.status === 'active');
            if (actives.length === 1 && actives[0].color === selectedColor && Object.keys(gameState.players).length > 1) {
                showEnd('VICTORIA', '¡Has ganado la partida!');
            }
        }

        function showEnd(tit, msg) {
            const screen = document.getElementById('end-screen');
            screen.style.display = 'flex';
            document.getElementById('end-title').innerText = tit;
            document.getElementById('end-title').style.color = tit === 'VICTORIA' ? 'var(--win)' : 'var(--loss)';
            document.getElementById('end-msg').innerText = msg;
        }

        function resetAdmin() { if(confirm("¿Limpiar sala?")) db.set(null).then(() => location.reload()); }
        function salir() { if(confirm("¿Salir?")) db.child('players/' + myId).remove().then(() => location.reload()); }
    </script>
</body>
</html>
